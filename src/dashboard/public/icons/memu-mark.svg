<?xml version="1.0" encoding="UTF-8"?>
<!--
  Memu logo mark — three overlapping indigo circles on transparent
  background. viewBox is 80x80; scales cleanly for any PWA icon size
  the browser asks for. Source of truth for the in-app sprite is
  dashboard.html's icon-1 symbol; this is the standalone file for
  installability + favicons.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="512" height="512">
  <defs>
    <linearGradient id="memuLogoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5054B5"/>
      <stop offset="1" stop-color="#9094FA"/>
    </linearGradient>
  </defs>
  <circle cx="30" cy="50" r="18" fill="url(#memuLogoGrad)" opacity="0.85"/>
  <circle cx="50" cy="50" r="18" fill="url(#memuLogoGrad)" opacity="0.85"/>
  <circle cx="40" cy="32" r="18" fill="url(#memuLogoGrad)" opacity="0.85"/>
</svg>
