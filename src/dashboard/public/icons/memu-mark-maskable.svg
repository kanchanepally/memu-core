<?xml version="1.0" encoding="UTF-8"?>
<!--
  Maskable variant of the Memu logo mark. PWA spec requires maskable
  icons to fill their entire canvas so OS launchers can apply any
  shape mask (circle / squircle / rounded square) without cropping
  important content. The "safe zone" is the inner 80% — content
  outside may be cropped.

  Approach: light indigo-tinted square background covers the full
  canvas, mark sits centred in the 80% safe zone. When unmasked it
  reads as the mark in a soft frame; when masked it crops to a
  pleasant gradient tile.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="memuMaskGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5054B5"/>
      <stop offset="1" stop-color="#9094FA"/>
    </linearGradient>
    <linearGradient id="memuMaskBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F4FC"/>
      <stop offset="1" stop-color="#E8E8F7"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#memuMaskBg)"/>
  <g transform="translate(10 10) scale(1.0)">
    <circle cx="30" cy="50" r="18" fill="url(#memuMaskGrad)" opacity="0.9"/>
    <circle cx="50" cy="50" r="18" fill="url(#memuMaskGrad)" opacity="0.9"/>
    <circle cx="40" cy="32" r="18" fill="url(#memuMaskGrad)" opacity="0.9"/>
  </g>
</svg>
