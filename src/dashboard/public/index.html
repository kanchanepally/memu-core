<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memu | Your Family's Chief of Staff</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar container">
        <a href="/" class="brand" style="display: flex; align-items: center;">
            <img src="/assets/logo.svg" alt="Memu Logo" onerror="this.src='/assets/logo.png'" style="height: 38px;">
        </a>
        <div class="nav-links">
            <a href="/dashboard.html" class="btn btn-secondary">Sign In</a>
        </div>
    </nav>

    <main class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding-top: 5rem;">
        <div class="glass-panel" style="max-width: 600px; text-align: center;">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 20px; background: var(--gradient-primary); margin-bottom: 2rem; box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            
            <h1>Your family's Chief of Staff.<br>Private by design.</h1>
            <p style="margin-bottom: 2.5rem; font-size: 1.125rem;">Memu coordinates your family's calendar, school emails, and daily chaos. Talk to it on WhatsApp or right here. The AI never learns your real names.</p>
            
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="/dashboard.html" class="btn btn-primary">
                    Start Free
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </a>
                <a href="#how-it-works" class="btn btn-secondary">See how it works</a>
            </div>
        </div>
    </main>

</body>
