<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memu | Chief of Staff</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1000px;">
            <a href="/" class="brand">
                <img src="/assets/logo.svg" alt="Memu Logo" onerror="this.src='/assets/logo.png'" style="height: 34px;">
            </a>
            <div class="nav-links" style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="/dashboard.html" style="text-decoration: none; color: var(--text-primary); font-weight: 500;">Home</a>
                <a href="#" style="text-decoration: none; color: var(--text-secondary);">Documents</a>
                <a href="#" style="text-decoration: none; color: var(--text-secondary);">Settings</a>
                <span style="width: 1px; height: 20px; background: var(--border-subtle); margin: 0 0.5rem;"></span>
                <img src="https://ui-avatars.com/api/?name=H+K&background=0F766E&color=fff&rounded=true" width="36" height="36" style="border-radius: 50%;">
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 3rem; padding-bottom: 120px; max-width: 1000px; display: grid; grid-template-columns: 280px 1fr; gap: 3rem; align-items: start;">
        
        <!-- Sidebar Utilities (Shopping List) -->
        <aside style="position: sticky; top: 100px; display: flex; flex-direction: column; gap: 2rem;">
            <div style="background: var(--color-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden;">
                <div style="background: #F8FAF9; border-bottom: 1px solid var(--border-subtle); padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin: 0;">🛒 Shopping List</h3>
                    <button style="background: none; border: none; font-size: 1.25rem; color: var(--color-accent); cursor: pointer; line-height: 1;">+</button>
                </div>
                <div style="padding: 1.25rem;">
                    <ul id="shopping-list-container" style="list-style: none; display: flex; flex-direction: column; gap: 0.85rem;">
                        <!-- JS Dynamic Inject -->
                    </ul>
                </div>
            </div>
        </aside>

        <!-- Main Content Area: Brief & Stream -->
        <section style="display: flex; flex-direction: column; gap: 3rem;">
            
            <!-- Today's Brief -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem;">
                    <div>
                        <p style="text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; font-weight: 600; color: var(--color-accent); margin-bottom: 0.25rem;">Morning Briefing</p>
                        <h2 style="margin: 0; font-size: 1.5rem; color: var(--text-primary);" id="date-header">Loading...</h2>
                    </div>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    
                    <!-- Clean Context Blocks -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        
                        <!-- CALENDAR MODULE -->
                        <div id="calendar-container" style="background: var(--color-surface); border: 1px solid var(--border-subtle); padding: 1.25rem; border-radius: var(--radius-md);">
                            <div id="calendar-events-container" style="height: 100%;">
                                <!-- Content will be dynamically loaded here -->
                            </div>
                        </div>

                        <!-- OTHERS MODULE (Placeholder) -->
                        <div style="background: var(--color-surface); border: 1px solid var(--border-subtle); padding: 1.25rem; border-radius: var(--radius-md);">
                            <div style="width: 32px; height: 32px; border-radius: 8px; background: #FEF3C7; color: #D97706; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; font-size: 1.2rem;">📧</div>
                            <p style="font-weight: 600; font-size: 0.95rem; color: var(--text-primary); margin-bottom: 0.25rem;">School Newsletter</p>
                            <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4;">Non-uniform day Friday.<br>Bring £1.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Intelligence Stream -->
            <div>
                <h3 style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    Intelligence Stream
                    <span style="height: 1px; flex: 1; background: var(--border-subtle);"></span>
                </h3>
                
                <div id="stream-container" style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <!-- Placeholder Stream Cards -->
                    <div class="card stream-card source-whatsapp" style="padding: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <span style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;">
                                <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--border-whatsapp);"></div>
                                Family WhatsApp · 2h ago
                            </span>
                        </div>
                        <p style="font-size: 1.05rem; font-weight: 500; color: var(--text-primary); margin-bottom: 0.5rem;">Rach: "we really need to book Robin's dentist"</p>
                        <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.25rem;">Extracted Task · Not yet resolved</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#fff; border-radius:12px; padding:2rem; width:90%; max-width:480px; box-shadow:0 8px 30px rgba(0,0,0,0.15);">
            <h3 style="margin:0 0 1.25rem; font-size:1.2rem; color:var(--text-primary);">Edit Card</h3>
            <input type="hidden" id="edit-card-id">
            <label style="font-size:0.85rem; font-weight:500; color:var(--text-secondary); display:block; margin-bottom:0.25rem;">Title</label>
            <input type="text" id="edit-title" style="width:100%; padding:0.6rem 0.75rem; border:1px solid var(--border-subtle); border-radius:8px; font-size:0.95rem; margin-bottom:1rem; box-sizing:border-box;">
            <label style="font-size:0.85rem; font-weight:500; color:var(--text-secondary); display:block; margin-bottom:0.25rem;">Details</label>
            <textarea id="edit-body" rows="4" style="width:100%; padding:0.6rem 0.75rem; border:1px solid var(--border-subtle); border-radius:8px; font-size:0.95rem; resize:vertical; margin-bottom:1.25rem; box-sizing:border-box;"></textarea>
            <div style="display:flex; justify-content:flex-end; gap:0.75rem;">
                <button class="btn btn-secondary" style="padding:0.5rem 1rem; font-size:0.9rem;" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" id="edit-save-btn" style="padding:0.5rem 1.5rem; font-size:0.9rem;" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <!-- Persistent Chat Drawer -->
    <div class="chat-drawer" id="chatDrawer">
        <!-- Exact same code as prior drawer -->
        <div class="chat-drawer-header" id="chatHeader">
            <h3 style="display: flex; align-items: center; gap: 0.75rem; font-size: 1.1rem; color: var(--text-primary);">
                <img src="/assets/logo.svg" width="24" onerror="this.src='/assets/logo.png'"> Ask Memu...
            </h3>
            <span style="color: var(--text-muted); font-size: 0.85rem;" id="drawerToggleText">Click to expand</span>
        </div>
        <div class="chat-history" id="chat-history"></div>
        <div class="chat-input-area">
            <form id="chat-form" style="display: flex; gap: 1rem; max-width: 900px; margin: 0 auto;">
                <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." autocomplete="off" required>
                <button type="submit" class="btn btn-primary" id="chat-submit" style="padding: 0 2rem; border-radius: var(--radius-pill);">Send</button>
            </form>
        </div>
    </div>

    <!-- Frontend Engine -->
    <script>
        // Set Header Date
        document.getElementById('date-header').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

        // Load REST Dashboard Brief
        async function loadBrief() {
            try {
                const res = await fetch('/api/dashboard/brief');
                const data = await res.json();
                
                // Render Calendar Widget Dynamically
                const calContainer = document.getElementById('calendar-container');
                if (data.events && data.events.length > 0) {
                    let eventsHtml = data.events.map(e => {
                        const time = new Date(e.startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        return `${e.title} (${time})`;
                    }).join('<br>');

                    calContainer.innerHTML = `
                        <div style="width: 32px; height: 32px; border-radius: 8px; background: #E0F2FE; color: #0284C7; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; font-size: 1.2rem;">📅</div>
                        <p style="font-weight: 600; font-size: 0.95rem; color: var(--text-primary); margin-bottom: 0.25rem;">${data.events.length} events today</p>
                        <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4;">${eventsHtml}</p>
                    `;
                } else if (data.events && data.events.length === 0) {
                    // Authenticated, just empty
                    calContainer.innerHTML = `
                        <div style="width: 32px; height: 32px; border-radius: 8px; background: #E0F2FE; color: #0284C7; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; font-size: 1.2rem;">📅</div>
                        <p style="font-weight: 500; font-size: 0.95rem; color: var(--text-primary); margin-bottom: 0.25rem;">Your calendar is clear today.</p>
                        <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4;">Family event sync is active.</p>
                    `;
                }
                
                // Render Stream Cards
                const streamContainer = document.getElementById('stream-container');
                if (data.streamCards && data.streamCards.length > 0) {
                    streamContainer.innerHTML = data.streamCards.map(card => {
                        let color, label;
                        if (card.source === 'whatsapp_group') {
                            color = 'var(--border-whatsapp)'; label = 'Family WhatsApp';
                        } else if (card.source === 'document') {
                            color = 'var(--border-document)'; label = 'Document Extraction';
                        } else {
                            color = 'var(--border-manual)'; label = 'Memu Intelligence';
                        }
                        
                        const timeStr = new Date(card.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        // Contextual actions
                        let contextHtml = '';
                        if (card.card_type !== 'shopping') {
                            contextHtml += `<button class="btn btn-secondary" style="padding: 0.4rem 0.75rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.3rem;" onclick="addToCalendar('${card.id}')">📅 Calendar</button>`;
                            contextHtml += `<button class="btn btn-secondary" style="padding: 0.4rem 0.75rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.3rem;" onclick="moveToShopping('${card.id}')">🛒 List</button>`;
                        }
                        // Core three: Edit, Done, Dismiss
                        const buttonsHtml = `
                            ${contextHtml}
                            <button class="btn btn-secondary" style="padding: 0.4rem 0.75rem; font-size: 0.8rem; margin-left: auto;" onclick="openEditModal('${card.id}', \`${card.title.replace(/`/g,'\\`').replace(/'/g,"\\'")}\`, \`${card.body.replace(/`/g,'\\`').replace(/'/g,"\\'")}\`)">✏️ Edit</button>
                            <button class="btn btn-primary" style="padding: 0.4rem 0.75rem; font-size: 0.8rem; background: #10b981; border-color: #10b981;" onclick="resolveCard('${card.id}')">✓ Done</button>
                            <button class="btn btn-secondary" style="padding: 0.4rem 0.75rem; font-size: 0.8rem; color: var(--text-muted); border-color: var(--border-subtle);" onclick="dismissCard('${card.id}')">✕ Dismiss</button>
                        `;

                        return `
                        <div class="card stream-card" style="padding: 1.5rem; border-left-color: ${color};">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <span style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;">
                                    <div style="width: 8px; height: 8px; border-radius: 50%; background: ${color};"></div>
                                    ${label} · ${timeStr}
                                </span>
                            </div>
                            <p style="font-size: 1.05rem; font-weight: 500; color: var(--text-primary); margin-bottom: 0.5rem;">${card.title}</p>
                            <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.25rem;">${card.body}</p>
                            <div style="display: flex; gap: 0.75rem;">
                                ${buttonsHtml}
                            </div>
                        </div>
                        `;
                    }).join('');
                } else {
                    streamContainer.innerHTML = '<p style="color: var(--text-muted); font-size: 0.95rem; text-align: center; padding: 2rem 0;">All caught up for now.</p>';
                }
                
                // Render Shopping List
                const shopContainer = document.getElementById('shopping-list-container');
                if (data.shoppingItems && data.shoppingItems.length > 0) {
                    shopContainer.innerHTML = data.shoppingItems.map(item =>
                        `<li style="display: flex; justify-content: space-between; align-items: center;">
                          <label style="display: flex; gap: 0.75rem; cursor: pointer; align-items: center; font-size: 0.95rem; color: var(--text-primary); flex: 1;">
                            <input type="checkbox" style="width: 1.1rem; height: 1.1rem; accent-color: var(--color-accent);" onchange="resolveCard('${item.id}')">
                            ${item.title}
                          </label>
                          <button style="background:none; border:none; cursor:pointer; font-size:0.8rem; color:var(--text-muted); padding:0.25rem;" onclick="openEditModal('${item.id}', '${item.title.replace(/'/g,"\\'")}', '${(item.body||'').replace(/'/g,"\\'")}')">✏️</button>
                        </li>`
                    ).join('');
                } else {
                    shopContainer.innerHTML = '<p style="font-size: 0.85rem; color: var(--text-muted); text-align: center;">List is empty</p>';
                }

            } catch (err) {
                console.error("Failed to load brief", err);
            }
        }
        
        loadBrief();

        async function addToCalendar(id) {
            try {
                document.body.style.cursor = 'wait';
                const res = await fetch('/api/calendar/add', {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ cardId: id })
                });
                const data = await res.json();
                document.body.style.cursor = 'default';
                if (!res.ok || data.error) {
                    showToast(data.error || 'Calendar sync failed. Connect Google Calendar in Settings first.', true);
                } else {
                    showToast('Added to calendar');
                    loadBrief();
                }
            } catch(e) {
                document.body.style.cursor = 'default';
                showToast('Network error — could not reach Memu', true);
            }
        }

        async function resolveCard(id) {
            try {
                await fetch('/api/stream/resolve', {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ cardId: id })
                });
                showToast('Done');
                loadBrief();
            } catch(e) {
                showToast('Failed to resolve', true);
            }
        }

        async function moveToShopping(id) {
            try {
                document.body.style.cursor = 'wait';
                await fetch('/api/stream/to-shopping', {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ cardId: id })
                });
                document.body.style.cursor = 'default';
                showToast('Moved to shopping list');
                loadBrief();
            } catch(e) {
                document.body.style.cursor = 'default';
                showToast('Failed to move to list', true);
            }
        }

        function showToast(msg, isError) {
            const el = document.createElement('div');
            el.textContent = msg;
            Object.assign(el.style, {
                position: 'fixed', bottom: '100px', left: '50%', transform: 'translateX(-50%)',
                background: isError ? '#fef2f2' : '#f0fdf4', color: isError ? '#dc2626' : '#16a34a',
                border: `1px solid ${isError ? '#fecaca' : '#bbf7d0'}`,
                padding: '0.75rem 1.5rem', borderRadius: '8px', fontSize: '0.9rem', fontWeight: '500',
                zIndex: '2000', boxShadow: '0 4px 12px rgba(0,0,0,0.1)', transition: 'opacity 0.3s',
            });
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
        }

        async function dismissCard(id) {
            try {
                await fetch('/api/stream/dismiss', {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ cardId: id })
                });
                showToast('Dismissed');
                loadBrief();
            } catch(e) {
                showToast('Failed to dismiss', true);
            }
        }

        // Edit modal
        function openEditModal(id, title, body) {
            const modal = document.getElementById('edit-modal');
            document.getElementById('edit-card-id').value = id;
            document.getElementById('edit-title').value = title;
            document.getElementById('edit-body').value = body;
            modal.style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        async function saveEdit() {
            const cardId = document.getElementById('edit-card-id').value;
            const title = document.getElementById('edit-title').value.trim();
            const body = document.getElementById('edit-body').value.trim();
            const btn = document.getElementById('edit-save-btn');
            btn.textContent = 'Saving...';
            btn.disabled = true;
            try {
                await fetch('/api/stream/edit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cardId, title, body })
                });
                closeEditModal();
                loadBrief();
            } catch(e) {
                console.error('Failed to save edit');
            } finally {
                btn.textContent = 'Save';
                btn.disabled = false;
            }
        }

        // ---------------- Chat Drawer Logic ----------------
        const drawer = document.getElementById('chatDrawer');
        const header = document.getElementById('chatHeader');
        const toggleText = document.getElementById('drawerToggleText');
        const form = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatHistory = document.getElementById('chat-history');
        const submitBtn = document.getElementById('chat-submit');
        let historyLoaded = false;

        // Load conversation history from server
        async function loadChatHistory() {
            if (historyLoaded) return;
            historyLoaded = true;
            try {
                const res = await fetch('/api/chat/history?limit=30');
                const data = await res.json();
                if (data.messages && data.messages.length > 0) {
                    chatHistory.innerHTML = '';
                    for (const msg of data.messages) {
                        addMessage(msg.userMessage, true);
                        addMessage(msg.memuResponse, false);
                    }
                } else {
                    addMessage("Good to see you. Ask me anything about your family's day, or tell me something to remember.", false);
                }
            } catch (err) {
                console.error('Failed to load chat history:', err);
                addMessage("Good to see you. Ask me anything about your family's day, or tell me something to remember.", false);
            }
        }

        header.addEventListener('click', () => {
            drawer.classList.toggle('open');
            if (drawer.classList.contains('open')) {
                chatInput.focus();
                toggleText.textContent = 'Click to collapse';
                loadChatHistory();
            } else {
                toggleText.textContent = 'Click to expand';
                chatInput.blur();
            }
        });

        chatInput.addEventListener('focus', () => {
            if (!drawer.classList.contains('open')) {
                drawer.classList.add('open');
                toggleText.textContent = 'Click to collapse';
                loadChatHistory();
            }
        });

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = isUser ? 'chat-bubble chat-user' : 'chat-bubble chat-memu';
            div.textContent = text;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            chatInput.value = '';
            submitBtn.disabled = true;

            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'chat-bubble chat-memu';
            loadingDiv.style.opacity = '0.5';
            loadingDiv.textContent = 'Memu is thinking...';
            chatHistory.appendChild(loadingDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const res = await fetch('/api/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                const data = await res.json();

                document.getElementById(loadingId).remove();
                addMessage(data.response || 'Sorry, I encountered an error.');
            } catch (err) {
                document.getElementById(loadingId).remove();
                addMessage('Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                chatInput.focus();
            }
        });
    </script>
</body>
</html>
